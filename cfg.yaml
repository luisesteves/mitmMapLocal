enable: true
mock_directory: "/Users/esteves/Mindera/PROXY"
rules:
#example
- interceptor:
    url_regexp: ".*waitrose.*/api/favourites2-.*/v\n/favourites"
    header_key: "allow"
    method: "POST"

  actions:
    response_file: "favourites/favourites.json"
    response_file_sequence: ["FileA", "FileB", "FileC"]
    response_body: "{}"
    delay: 5
    status_code: 200
    request:
      add_query_parameter:
        - key: "<key>"
          value: "<value>"  
    add_header_request:
      - key: "<key>"
        value: "<value>"
    save:
      request:
        - "header"
        - "cookie"
      response:
        - "header"
        - "cookie"
  marker: "https://api.github.com/emojis"
  active: false

- interceptor:
    url_regexp: ".*waitrose.*"
  actions:
    delay: 2
  active: false

# branches
- interceptor:
    url_regexp: "waitrose\\.com/api/branch-\\D{2,4}/v\\d/branches\\?fulfilment_type=COLLECTION"
  actions:
    response_file: "branches/parking-miles-665.json"
  active: false

# browse
- interceptor:
    url_regexp: "content-.*/cms/publish/productcontent/browse"
  actions:
    response_file: "product-content/browse/live.json"
  active: false

#content
- interceptor:
    url_regexp: ".*waitrose.com/api/content-.*/content/waitrosegroceriescms/waitrose-app/homescreen"
  actions:
    response_file: "content/waitrosegroceriescms/waitrose-app/homescreen/meal-deals.json"
  active: false

- interceptor:
    url_regexp: ".*waitrose.com/api/content-qa/.*/content/experience-fragments/waitrosegroceriescms/Apps/home-screen/master"
  actions:
    response_file: "content/waitrosegroceriescms/waitrose-app/homescreen/meal-deals.json"
  active: true

#products
#chosen for tyou
#wtr-wec-acpt.waitrose.com /api/products-qa/v1/products?view=SUMMARY&trolleyId=1000854799&size=24&start=0&filterByCustomerSlot=true&excludeLinesFromTrolley=true&excludeLinesWithConflicts=true&showRecommendations=true&excludeHfss=true
- interceptor:
    url_regexp: "waitrose\\.com/api/products-\\D{2,4}/v\\d/products\\?.*showRecommendations=true"
  actions:
    response_file: "products/chosen-for-you.json"
  active: false

#favourites-on-offer
- interceptor:
    url_regexp: "waitrose\\.com/api/products-\\D{2,4}/v\\d/products\\?.*customersFavouritesOnly=true"
  actions:
    response_file: "products/favs-on-offer.json"
  active: false


#products - order details 
- interceptor:
    url_regexp: "waitrose\\.com/api/products-\\D{2,4}/v\\d/products/\\d{6}.*"
  actions:
    response_file: "products/live.json"
  active: false

#productcontent/
- interceptor:
    url_regexp: "waitrose\\.com/api/content-\\D{2,4}/v\\d/cms/publish/productcontent/search"
  actions:
    response_file: "product-content/browse/live.json"
  active: false

#search - product pdp
- interceptor:
    url_regexp: "waitrose\\.com/api/custsearch-\\D{2,4}/v\\d/search/\\d*/\\d*-\\d*-\\d*\\?orderId=\\d*"
  actions:
    #response_file: "products/prod-parse-error.json"
    response_file: "search/products/088528-45453-45454.json"
  active: false

 #search incomplete offers
- interceptor:
    url_regexp: "waitrose\\.com/api/custsearch-\\D{2,4}/v\\d/search/\\d*"
  actions:
    response_file: "search/prod-product-incomplet-offers.json"
  active: false

# slot-messages
- interceptor:
    url_regexp: "waitrose\\.com/api/slot-experience-\\D{1,4}/v\\d/slot-messages\\?.*slotType=DELIVERY"
  actions:
    #response_file_sequence: ["slot-experience/slot-experience-error.json", "slot-experience/slot-experience-informative.json", "slot-experience/slot-experience-success.json", "slot-experience/slot-experience-warning.json"]
    #status_code: 400
    #response_body: ""
    request:
      add_query_parameter:
        - key: "clientType"
          value: "MOBILE_APP"
  marker: "grapes"
  active: true


- interceptor:
    url_regexp: "waitrose\\.com/api/slot-experience-\\D{1,4}/v\\d/slot-messages\\?.*slotType=ENTERTAINING_COLLECTION"
  actions:
    response_file: "slot-experience/slot-experience-informative.json"
    add_header_request:
       - key: "<key>"
         value: "<value>"
  active: false

- interceptor:
    url_regexp: "waitrose\\.com/api/slot-experience-\\D{1,4}/v\\d/slot-messages\\?.*slotType=GROCERY_COLLECTION"
  actions:
    response_file: "slot-experience/slot-experience-warning.json"
  active: false

# FAVs
- interceptor:
    url_regexp: "waitrose.*products"
  actions:
    status_code: 404
  active: false

# CHOOSE VOUCHERS, mywaitrose-rewards
- interceptor:
    url_regexp: "waitrose.*mywaitrose-rewards"
  actions:
    #response_file: "Vouchers/mywaitrose-rewards/v2/useMoreOften.json"
    response_file: "Vouchers/mywaitrose-rewards/v2/allUsed.json"
    #response_file: "Vouchers/mywaitrose-rewards/v2/live.json"
    status_code: 200
  active: false

# WALLET, incentive-offers
- interceptor:
    url_regexp: "waitrose.*incentive-offers"
    method: "GET"
  actions:
    #response_file: "Vouchers/incentive-offer-qa/empty.json"
    #response_file: "Vouchers/incentive-offer-qa/live.json"
    #response_file: "Vouchers/incentive-offer-qa/newspapper.json"
    #response_file: "Vouchers/incentive-offer-qa/only-newspapper.json"
    response_file: "Vouchers/incentive-offer-qa/test.json"
    #response_file: "Vouchers/incentive-offer-qa/sort.json"
    status_code: 200
  active: false


##########################################################
#                                                        #
#                                                        #
#                  Choose voucher flow                   #
#                                                        #
#                                                        #
##########################################################
- interceptor:
    url_regexp: ".*waitrose.*mywaitrose-rewards"
    signal: "start"
  actions:
    response_file: "Vouchers/mywaitrose-rewards/v2/live.json"
    status_code: 200
  active: false
# \/
- interceptor:
    url_regexp: ".*waitrose.*mywaitrose-rewards"
    signal: "post"
  actions:
    response_file: "Vouchers/mywaitrose-rewards/v2/live-after-post.json"
    status_code: 200
    signal: "start"
  active: false
# \/
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "start"
  actions:
    response_file: "Vouchers/incentive-offer-qa/live.json"
    #response_file: "Vouchers/incentive-offer-qa/empty.json"
    status_code: 200
  active: false
# \/
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "POST"
  actions:
    response_file: "Vouchers/incentive-offer-qa/POST/post.json"
    status_code: 200
    signal: "post"
  active: false
# \/
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "post"
  actions:
    response_file: "Vouchers/incentive-offer-qa/live-after-post.json"
    status_code: 200
    delay: 2
  active: false

##########################################################
#                                                        #
#                                                        #
#                Choose voucher flow END                 #
