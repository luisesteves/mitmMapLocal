enable: true
rules:
#example
- interceptor:
    urlRegexp: ".*waitrose.*/api/favourites2-.*/v\n/favourites"
  actions:
    responseFromFile: "favourites/favourites.json"
    responseFromFiles: ["FicheiroA", "ficheirob", "C"]
  active: false

#vouchers wallet
- interceptor:
    urlRegexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "start"
  actions:
    responseFromFile: "Vouchers/incentive-offer-qa/live.json"
    statusCode: 200
  active: true

- interceptor:
    urlRegexp: ".*waitrose.*incentive-offers"
    method: "POST"
  actions:
    responseFromFile: "Vouchers/incentive-offer-qa/POST/post.json"
    statusCode: 200
    signal: "post"
  active: true

- interceptor:
    urlRegexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "post"
  actions:
    responseFromFile: "Vouchers/incentive-offer-qa/live-after-post.json"
    statusCode: 200
  active: true


#Choose vouchers
- interceptor:
    urlRegexp: ".*waitrose.*mywaitrose-rewards"
    signal: "start"
  actions:
    responseFromFile: "Vouchers/mywaitrose-rewards/v2/live.json"
    statusCode: 200
  active: true

- interceptor:
    urlRegexp: ".*waitrose.*mywaitrose-rewards"
    signal: "post"
  actions:
    responseFromFile: "Vouchers/mywaitrose-rewards/v2/live-after-post.json"
    statusCode: 200
    signal: "start"
  active: true

#content
- interceptor:
    urlRegexp: ".*waitrose.com/api/content-.*/content/waitrosegroceriescms/waitrose-app/homescreen"
  actions:
    responseFromFile: "content/waitrosegroceriescms/waitrose-app/homescreen/meal-deals.json"
  active: true


#deeplinks
- interceptor:
    urlRegexp: ".*example.*"
  actions:
    responseFromFile: "mydeeplinks.html"
  active: true
