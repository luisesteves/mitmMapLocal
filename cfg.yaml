- interceptor:
    url_regexp: "waitrose.*incentive-offers/.*/load"
    method: "PATCH"
  actions:
    response:
      status_code: 200
      body: ""
      signal: "patch"
  active: true

- interceptor:
    url_regexp: "waitrose.*incentive-offers$"
    signal: "patch"
    method: "GET"
  actions:
    response:
      file: "Vouchers/incentive-offer-qa/nuno-2.json"
