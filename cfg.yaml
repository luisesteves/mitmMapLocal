enable: true
mock_directory: "/Users/esteves/Mindera/PROXY"
rules:
#example
- interceptor:
    url_regexp: ".*waitrose.*/api/favourites2-.*/v\n/favourites"
    header_key: "allow"
    method: "POST"

  actions:
    request:
      delay: 5
      add_query_parameter:
        - key: "<key>"
          value: "<value>"  
      add_header:
        - key: "<key>"
          value: "<value>"
      save:
        - "header"
        - "cookie"
    response:
      file: "favourites/favourites.json"
      file_sequence: ["FileA", "FileB", "FileC"]
      add_header:
        - key: "<key>"
          value: "<value>"
      remove_header: "<key>"
      change_header_key:
        - key: "<key>"
          new_key: "<value>"
      body: "{}"
      delay: 5
      status_code: 200
      save:
        - "header"
        - "cookie"
  marker: "https://api.github.com/emojis"
  active: false

- interceptor:
    url_regexp: ".*waitrose.*"
  actions:
    request:
      delay: 0.5
  active: false


# address Options
- interceptor:
    url_regexp: "waitrose\\.com/api/address-\\D{2,4}/v\\d/addresses/\\d*"
