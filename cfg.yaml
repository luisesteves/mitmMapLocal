##########################################################
- interceptor:
    url_regexp: ".*waitrose.*mywaitrose-rewards"
    signal: "start"
  actions:
    response:
      file: "Vouchers/mywaitrose-rewards/v2/live.json"
      status_code: 200
  # active: true
# ⬇️
- interceptor:
    url_regexp: ".*waitrose.*mywaitrose-rewards"
    signal: "post"
  actions:
    response:
      file: "Vouchers/mywaitrose-rewards/v2/live-after-post.json"
      status_code: 200
      signal: "start"
  # active: true
# ⬇️
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "start"
  actions:
    response:
      file: "Vouchers/incentive-offer-qa/old/live.json"
      #file: "Vouchers/incentive-offer-qa/empty.json"
      status_code: 200
  # active: true
# ⬇️
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "POST"
  actions:
    response:
      file: "Vouchers/incentive-offer-qa/POST/post.json"
      status_code: 200
      signal: "post"
  # active: true
# ⬇️
- interceptor:
    url_regexp: ".*waitrose.*incentive-offers"
    method: "GET"
    signal: "post"
  actions:
    response:
      file: "Vouchers/incentive-offer-qa/old/live-after-post.json"
      status_code: 200
      delay: 2
  # active: true

##########################  END  ##########################

